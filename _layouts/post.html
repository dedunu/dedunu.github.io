---
layout: default
---
<section class="post">
  <h2>{{ page.title }}</h2>
  {{ content }}
  <span class="meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time> &middot; {% for tag in page.tags %}
    {{tag}}{% unless forloop.last %}, {% endunless %}{% endfor %}</span>
</section>

<div class="hidden-md hidden-lg">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-9893696410841309"
     data-ad-slot="4234796933"
     data-ad-format="rectangle"
     data-full-width-responsive="true"></ins>
    <script>
        var el = document.querySelector('.hidden-md, .hidden-lg');
        var display = window.getComputedStyle(el, null).getPropertyValue('display');
        var ins = el.querySelector('ins');
        if (display === 'block'){
            ins.setAttribute('data-ad-format', 'auto');
        }
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>
